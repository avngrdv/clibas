name: build and publish

on:
  push:
    tags:
      - "v.*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]
        # macos-13 = x86_64, macos-14 = arm64 (Apple Silicon)

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # build for Python 3.10–3.13
          CIBW_BUILD: cp310-* cp311-* cp312-* cp313-*
          # skip 32-bit builds and PyPy
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
          # install build dependencies inside the wheel build environment
          CIBW_BEFORE_BUILD: pip install numpy cython
          # run a quick smoke test after each wheel is built
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: python -c "from clibas.cython_hacks import idx_finder; print('cython_hacks OK')"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build numpy cython

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # only publish on tagged releases
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/clibas/
    permissions:
      id-token: write  # required for trusted publishing (no API token needed)

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
