    CCT: "P"
    CAC: "H"
    CAT: "H" 
    CAA: "Q" 
    CAG: "Q"
    CGA: "R"
    CGC: "R"
    CGG: "R"
    CGT: "R"
    GTA: "V" 
    GTC: "V" 
    GTG: "V"
