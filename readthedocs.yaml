version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.11"
  apt_packages:
    - pandoc
  jobs:
    pre_build:
      - pip install numpy cython
      - python setup.py build_ext --inplace

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - ml
    - requirements: docs/requirements.txt

sphinx:
  builder: html
  configuration: docs/source/conf.py
  fail_on_warning: false
