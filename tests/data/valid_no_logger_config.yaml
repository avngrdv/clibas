experiment: "Heinis_FXIa_selection"

constants:
  description: |
    Star symbol (*) is internally reserved for stop codons that terminate
    translation.
    
    Plus and underscore symbols (+ and _) are internally reserved tokens.
    Numerals (1234567890) are internally reserved for library design 
    specifications. These symbols (123456790+_) should not be used to
    encode amino acids.
    
    Other symbols are OK.   
    
  translation_table:
    ATA: "I"
    ATC: "I"
    ATT: "I"
    ATG: "M"
    ACA: "T"
    ACC: "T"
    ACG: "T"
    ACT: "T"
    AAC: "N"
    AAT: "N"
    AAA: "K" 
    AAG: "K"
    AGC: "S"
    AGT: "S"
    AGA: "R"
    AGG: "R"
    CTA: "L" 
    CTC: "L"
    CTG: "L"
    CTT: "L"
    CCA: "P" 
    CCC: "P" 
    CCG: "P" 
    CCT: "P"
    CAC: "H"
    CAT: "H" 
    CAA: "Q" 
    CAG: "Q"
    CGA: "R"
    CGC: "R"
    CGG: "R"
    CGT: "R"
    GTA: "V" 
    GTC: "V" 
    GTG: "V"
    GTT: "V"
    GCA: "A" 
    GCC: "A" 
    GCG: "A" 
    GCT: "A"
    GAC: "D" 
