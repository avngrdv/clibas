    TGA: "*" 
    TGG: "W"
  
  aa_SMILES:
    A: "N[C@@H](C)C(=O)"           
    C: "N[C@@H](CS)C(=O)"
    D: "N[C@@H](CC(=O)O)C(=O)"
    E: "N[C@@H](CCC(=O)O)C(=O)"
    F: "N[C@@H](Cc1ccccc1)C(=O)"
    G: "NCC(=O)"
    H: "N[C@@H](Cc1c[nH]cn1)C(=O)"
    I: "N[C@@H]([C@H](CC)C)C(=O)"
    K: "N[C@@H](CCCCN)C(=O)"       
    L: "N[C@@H](CC(C)C)C(=O)"
    M: "N[C@@H](CCSC)C(=O)"
    N: "N[C@@H](CC(=O)N)C(=O)"
    P: "O=C[C@@H]1CCCN1"
    Q: "N[C@@H](CCC(=O)N)C(=O)"
    R: "N[C@@H](CCCNC(=N)N)C(=O)"
    S: "N[C@@H](CO)C(=O)"
    T: "N[C@@H]([C@H](O)C)C(=O)"
    V: "N[C@@H](C(C)C)C(=O)"
    W: "N[C@@H](Cc1c[nH]c2c1cccc2)C(=O)"
    Y: "N[C@@H](Cc1ccc(O)cc1)C(=O)"
    
  complement_table:
    - "ATCGN"
    - "TAGCN"
    
